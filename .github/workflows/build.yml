name: Build Firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: platformio run
